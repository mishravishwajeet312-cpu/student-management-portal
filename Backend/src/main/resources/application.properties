# --- Application name and port ---
spring.application.name=student-table-backend
server.port=${PORT:10000}

# --- Database Configuration (PostgreSQL via Render/Cloud) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://dpg-d6v1rkhr0fns73c0nhug-a/student_db_qd74}
spring.datasource.username=${DB_USERNAME:student_db_qd74_user}
spring.datasource.password=${DB_PASSWORD:Iyw6ziWWPJTaMBQT16pHlVqNvpmi6PhG}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate Configuration ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
# Fix "open-in-view" warning (strongly recommended)
spring.jpa.open-in-view=false

# --- DevTools (optional; safe defaults) ---
spring.devtools.restart.enabled=${DEVTOOLS_RESTART:false}

# --- JWT Configuration (Security) ---
jwt.secret=${JWT_SECRET:ChangeThisSecretToAtLeast32CharsLong!!}
jwt.expirationMs=86400000

# --- Admin Seeding Config (safe for dev only) ---
admin.seed.enabled=${ADMIN_SEED_ENABLED:true}
admin.seed.email=${ADMIN_SEED_EMAIL:admin@example.com}
admin.seed.password=${ADMIN_SEED_PASSWORD:admin123}

# --- Mail/OTP Configuration (Optional – update as needed) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- CORS (Add your frontend domain to allowed origins) ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://studentmanagement-portal.netlify.app}

# --- (Optional) Spring Actuator for health check ---
management.endpoints.web.exposure.include=health,info

# --- Logging Configuration ---
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# --- Timezone Setting ---
spring.jackson.time-zone=UTC
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# --- HikariCP Connection Pool Tweaks ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000

# --- Spring Profiles --- (uncomment and set if you use profiles)
# spring.profiles.active=prod

# --- Error Handling ---
server.error.include-message=never
server.error.include-binding-errors=never

# --- Swagger/Docs (for REST APIs) ---
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}

# --- Static Resource Caching ---
spring.web.resources.cache.cachecontrol.max-age=3600

# --- Optional Security Headers ---
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
