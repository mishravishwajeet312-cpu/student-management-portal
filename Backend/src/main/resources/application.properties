# Application Configuration
spring.application.name=student-table-backend
server.port=${PORT:8080}

# Database Configuration (Railway MySQL)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# DevTools Configuration
spring.devtools.restart.enabled=${DEVTOOLS_RESTART:false}

# JWT Configuration
jwt.secret=ChangeThisSecretToAtLeast32CharsLong!!
jwt.expirationMs=86400000

# Admin Seed (dev only)
admin.seed.enabled=${ADMIN_SEED_ENABLED:false}
admin.seed.email=${ADMIN_SEED_EMAIL:admin@example.com}
admin.seed.password=${ADMIN_SEED_PASSWORD:admin123}

# Mail Configuration (OTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://studentmanagement-portal.netlify.app}
